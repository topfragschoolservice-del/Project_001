<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Smart School Transport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body class="auth-page" style="margin: 0; padding: 0;">
  <div class="bg-layer"></div>
  
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="brand-title">Smart Transport</h1>
        <p class="brand-subtitle">School Mobility Platform</p>
      </div>

      <form id="loginForm" class="login-form">
        <h2>Sign In</h2>
        <p class="form-help">Access your account to manage transport operations.</p>
        
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input id="loginEmail" type="email" placeholder="user@school.lk" required />
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter your password" required />
        </div>

        <button class="btn primary btn-block" type="submit">Sign In</button>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Create one</a></p>
          <p class="demo-hint">Demo: parent@school.lk / parent123</p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="src/js/auth.js"></script>
</body>
</html>
