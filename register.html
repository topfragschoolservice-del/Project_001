<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Smart School Transport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body class="auth-page" style="margin: 0; padding: 0;">
  <div class="bg-layer"></div>
  
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="brand-title">Smart Transport</h1>
        <p class="brand-subtitle">School Mobility Platform</p>
      </div>

      <form id="registerForm" class="register-form">
        <h2>Create Account</h2>
        <p class="form-help">Join your school's transport network as a parent, driver, or admin.</p>
        
        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input id="registerName" type="text" placeholder="Your full name" required />
        </div>
        
        <div class="form-group">
          <label for="registerEmail">Email Address</label>
          <input id="registerEmail" type="email" placeholder="your.email@school.lk" required />
        </div>

        <div class="form-group">
          <label for="registerPhone">Phone Number</label>
          <input id="registerPhone" type="tel" placeholder="+94 XX XXX XXXX" required />
        </div>
        
        <div class="form-group">
          <label for="registerPassword">Create Password</label>
          <input id="registerPassword" type="password" placeholder="Minimum 6 characters" required />
        </div>
        
        <div class="form-group">
          <label for="registerRole">Account Role</label>
          <select id="registerRole" required>
            <option value="">Select your role</option>
            <option value="parent">Parent / Guardian</option>
            <option value="driver">Bus Driver</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div id="childrenSection" class="form-group" style="display: none;">
          <label>Children (if Parent)</label>
          <div class="children-list">
            <div id="childrenContainer"></div>
            <button type="button" class="add-child-btn" id="addChildBtn">+ Add Child</button>
          </div>
        </div>

        <button class="btn warn btn-block" type="submit">Create Account</button>
        
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="src/js/auth.js"></script>
</body>
</html>
